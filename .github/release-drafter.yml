name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "🧪 Tests"
    labels:
      - "test"
      - "tests"
  - title: "📖 Documentation"
    labels:
      - "documentation"
      - "docs"
  - title: "🧰 Maintenance"
    labels:
      - "chore"
      - "maintenance"
      - "dependencies"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - "major"
      - "breaking-change"
  minor:
    labels:
      - "minor"
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "patch"
      - "fix"
      - "bugfix"
      - "bug"
      - "documentation"
      - "chore"
      - "maintenance"
      - "dependencies"
  default: patch
template: |
  ## Changes

  $CHANGES
