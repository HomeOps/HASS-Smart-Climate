name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-manifest:
    name: Update manifest version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json version
        run: |
          python3 -c "
          import json, pathlib
          p = pathlib.Path('custom_components/smart_climate/manifest.json')
          manifest = json.loads(p.read_text())
          manifest['version'] = '${{ steps.version.outputs.version }}'
          p.write_text(json.dumps(manifest, indent=2) + '\n')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/smart_climate/manifest.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update manifest.json version to ${{ steps.version.outputs.version }}"
          git push
