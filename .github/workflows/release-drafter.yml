name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    name: Draft next release notes
    runs-on: ubuntu-latest
    # Skip commits pushed by the release workflow bot to avoid triggering
    # a new release immediately after manifest.json is updated.
    if: github.event_name == 'pull_request' || github.actor != 'github-actions[bot]'
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          # Publish the release automatically when a PR is merged to main.
          # For pull_request events the release stays as a draft so
          # contributors can see what the next release will look like.
          publish: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
